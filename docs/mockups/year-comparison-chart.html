<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year-over-Year Comparison — Strava Dashboard Mockup</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --background: #0a0a0a;
      --foreground: #ededed;
      --foreground-5: rgba(237, 237, 237, 0.05);
      --foreground-10: rgba(237, 237, 237, 0.1);
      --foreground-50: rgba(237, 237, 237, 0.5);
      --accent: #FC4C02;
      --grid-color: rgba(237, 237, 237, 0.1);
      --tooltip-bg: #0a0a0a;
      --tooltip-border: rgba(128, 128, 128, 0.2);
      --prev-year-bar: rgba(128, 128, 128, 0.3);
      --prev-year-bar-hover: rgba(128, 128, 128, 0.45);
      --toggle-bg: rgba(237, 237, 237, 0.08);
      --toggle-hover: rgba(237, 237, 237, 0.12);
    }

    html.light {
      --background: #ffffff;
      --foreground: #171717;
      --foreground-5: rgba(23, 23, 23, 0.05);
      --foreground-10: rgba(23, 23, 23, 0.1);
      --foreground-50: rgba(23, 23, 23, 0.5);
      --grid-color: rgba(23, 23, 23, 0.1);
      --tooltip-bg: #ffffff;
      --tooltip-border: rgba(128, 128, 128, 0.2);
      --prev-year-bar: rgba(128, 128, 128, 0.4);
      --prev-year-bar-hover: rgba(128, 128, 128, 0.55);
      --toggle-bg: rgba(23, 23, 23, 0.06);
      --toggle-hover: rgba(23, 23, 23, 0.1);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--background);
      color: var(--foreground);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 200ms ease, color 200ms ease;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    @media (min-width: 768px) {
      .container {
        padding: 40px;
      }
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 50;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: var(--foreground-5);
      color: var(--foreground);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 200ms ease, color 200ms ease;
    }

    .theme-toggle:hover {
      background: var(--foreground-10);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
    }

    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    html.light .theme-toggle .icon-sun { display: block; }
    html.light .theme-toggle .icon-moon { display: none; }

    /* Card */
    .card {
      background: var(--foreground-5);
      border-radius: 12px;
      padding: 20px;
      transition: background-color 200ms ease;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--foreground);
      transition: color 200ms ease;
    }

    /* Metric toggle pills */
    .metric-toggle {
      display: flex;
      gap: 4px;
      background: var(--toggle-bg);
      border-radius: 8px;
      padding: 3px;
      transition: background-color 200ms ease;
    }

    .metric-btn {
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 5px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--foreground-50);
      cursor: pointer;
      transition: background-color 150ms ease, color 150ms ease;
      white-space: nowrap;
    }

    .metric-btn:hover {
      background: var(--toggle-hover);
      color: var(--foreground);
    }

    .metric-btn.active {
      background: var(--accent);
      color: #ffffff;
    }

    .metric-btn.active:hover {
      background: var(--accent);
      color: #ffffff;
    }

    /* Chart area */
    .chart-wrapper {
      height: 340px;
      position: relative;
      display: flex;
    }

    @media (min-width: 768px) {
      .chart-wrapper {
        height: 380px;
      }
    }

    /* Y-axis */
    .y-axis {
      display: flex;
      flex-direction: column-reverse;
      justify-content: space-between;
      padding-bottom: 28px;
      width: 48px;
      flex-shrink: 0;
    }

    .y-axis-label {
      font-size: 0.75rem;
      color: var(--foreground-50);
      text-align: right;
      padding-right: 8px;
      line-height: 1;
      transition: color 200ms ease;
    }

    /* Chart body (bars + grid) */
    .chart-body {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Grid lines */
    .grid-lines {
      position: absolute;
      inset: 0;
      bottom: 28px;
      display: flex;
      flex-direction: column-reverse;
      justify-content: space-between;
      pointer-events: none;
    }

    .grid-line {
      border-top: 1px dashed var(--grid-color);
      transition: border-color 200ms ease;
    }

    .grid-line:first-child {
      border-top: none;
    }

    /* Bar area */
    .bars-area {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 0;
      padding-bottom: 28px;
    }

    /* Month column */
    .month-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
    }

    .bar-group {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      width: 100%;
      padding: 0 2px;
    }

    .bar {
      flex: 1;
      max-width: 28px;
      min-height: 0;
      border-radius: 4px 4px 0 0;
      transition: height 400ms cubic-bezier(0.4, 0, 0.2, 1), filter 150ms ease;
      position: relative;
      cursor: default;
    }

    .bar:hover {
      filter: brightness(1.15);
    }

    .bar--current {
      background: var(--accent);
    }

    .bar--previous {
      background: var(--prev-year-bar);
      transition: height 400ms cubic-bezier(0.4, 0, 0.2, 1), filter 150ms ease, background-color 200ms ease;
    }

    .bar--previous:hover {
      background: var(--prev-year-bar-hover);
    }

    /* CSS tooltip */
    .bar[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--tooltip-bg);
      color: var(--foreground);
      border: 1px solid var(--tooltip-border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 150ms ease;
      z-index: 10;
    }

    .bar[data-tooltip]:hover::after {
      opacity: 1;
    }

    /* Month labels */
    .month-label {
      font-size: 0.75rem;
      color: var(--foreground-50);
      padding-top: 8px;
      height: 28px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      transition: color 200ms ease;
    }

    /* Legend */
    .chart-legend {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--foreground-10);
      transition: border-color 200ms ease;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8125rem;
      color: var(--foreground-50);
      transition: color 200ms ease;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-swatch--current {
      background: var(--accent);
    }

    .legend-swatch--previous {
      background: var(--prev-year-bar);
      transition: background-color 200ms ease;
    }

    /* Summary */
    .summary {
      margin-top: 12px;
      font-size: 0.875rem;
      color: var(--foreground-50);
      transition: color 200ms ease;
    }

    .summary strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Mockup badge */
    .mockup-badge {
      text-align: center;
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--foreground-50);
      opacity: 0.6;
      transition: color 200ms ease;
    }
  </style>
</head>
<body>
  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Year-over-Year Comparison</h2>
        <div class="metric-toggle" role="tablist" aria-label="Select metric">
          <button class="metric-btn active" role="tab" aria-selected="true" data-metric="distance">Distance (km)</button>
          <button class="metric-btn" role="tab" aria-selected="false" data-metric="elevation">Elevation (m)</button>
          <button class="metric-btn" role="tab" aria-selected="false" data-metric="rides">Ride Count</button>
        </div>
      </div>

      <div class="chart-wrapper">
        <div class="y-axis" id="yAxis"></div>
        <div class="chart-body">
          <div class="grid-lines" id="gridLines"></div>
          <div class="bars-area" id="barsArea"></div>
        </div>
      </div>

      <div class="chart-legend">
        <div class="legend-item">
          <span class="legend-swatch legend-swatch--current"></span>
          <span>2025</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch legend-swatch--previous"></span>
          <span>2024</span>
        </div>
      </div>

      <div class="summary" id="summaryText"></div>
    </div>

    <div class="mockup-badge">Mockup for GitHub Issue #15 — Year-over-Year Monthly Comparison Chart</div>
  </div>

  <script>
    // -------------------------------------------------------------------
    // Data
    // -------------------------------------------------------------------
    var MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

    var DATA = {
      distance: {
        current: [180, 220, 350, 420, 510, 580, 620, 590, 480, 390, 250, 150],
        previous: [120, 160, 280, 350, 440, 500, 540, 510, 420, 310, 200, 100],
        unit: 'km',
        label: 'Distance',
      },
      elevation: {
        current: [1200, 1800, 3200, 4500, 5800, 6200, 7100, 6800, 5200, 3800, 2000, 1100],
        previous: [900, 1400, 2600, 3800, 4900, 5400, 6000, 5800, 4500, 3000, 1600, 800],
        unit: 'm',
        label: 'Elevation',
      },
      rides: {
        current: [8, 10, 15, 18, 22, 24, 26, 25, 20, 16, 11, 7],
        previous: [6, 8, 12, 15, 19, 21, 23, 22, 18, 13, 9, 5],
        unit: '',
        label: 'Rides',
      },
    };

    // Simulated current month index (March = 2 for a March 2025 snapshot)
    var CURRENT_MONTH_INDEX = 2;

    // Number of horizontal grid steps (produces GRID_STEPS + 1 lines including baseline)
    var GRID_STEPS = 5;

    // -------------------------------------------------------------------
    // Theme handling
    // -------------------------------------------------------------------
    function getSystemPreference() {
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.classList.add('light');
      } else {
        document.documentElement.classList.remove('light');
      }
    }

    var currentTheme = localStorage.getItem('theme') || getSystemPreference();
    applyTheme(currentTheme);

    document.getElementById('themeToggle').addEventListener('click', function () {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', currentTheme);
      applyTheme(currentTheme);
    });

    // -------------------------------------------------------------------
    // Chart rendering
    // -------------------------------------------------------------------
    var activeMetric = 'distance';

    /**
     * Compute a rounded "nice" max so Y-axis ticks are clean numbers.
     */
    function niceMax(rawMax) {
      if (rawMax <= 0) return 10;
      var magnitude = Math.pow(10, Math.floor(Math.log10(rawMax)));
      var fraction = rawMax / magnitude;
      var nice;
      if (fraction <= 1) nice = 1;
      else if (fraction <= 1.5) nice = 1.5;
      else if (fraction <= 2) nice = 2;
      else if (fraction <= 3) nice = 3;
      else if (fraction <= 5) nice = 5;
      else if (fraction <= 7) nice = 7;
      else nice = 10;
      return nice * magnitude;
    }

    /**
     * Format a Y-axis tick value. Large numbers get a "k" suffix.
     */
    function formatTick(value) {
      if (value >= 1000) {
        var k = value / 1000;
        return (k % 1 === 0 ? k.toFixed(0) : k.toFixed(1)) + 'k';
      }
      return String(value);
    }

    /**
     * Format a bar value for tooltip display.
     */
    function formatValue(value, unit) {
      var str = value.toLocaleString();
      return unit ? str + ' ' + unit : str;
    }

    /**
     * Build Y-axis labels and grid lines; returns the computed max.
     */
    function renderYAxis(metric) {
      var d = DATA[metric];
      var allValues = d.current.concat(d.previous);
      var rawMax = Math.max.apply(null, allValues);
      var max = niceMax(rawMax);

      var yAxisEl = document.getElementById('yAxis');
      var gridEl = document.getElementById('gridLines');
      yAxisEl.innerHTML = '';
      gridEl.innerHTML = '';

      for (var i = 0; i <= GRID_STEPS; i++) {
        var value = Math.round((max / GRID_STEPS) * i);

        var label = document.createElement('span');
        label.className = 'y-axis-label';
        label.textContent = formatTick(value);
        yAxisEl.appendChild(label);

        var line = document.createElement('div');
        line.className = 'grid-line';
        gridEl.appendChild(line);
      }

      return max;
    }

    /**
     * Build month columns with paired current/previous bars.
     */
    function renderBars(metric, max) {
      var d = DATA[metric];
      var barsArea = document.getElementById('barsArea');
      barsArea.innerHTML = '';

      for (var i = 0; i < 12; i++) {
        var col = document.createElement('div');
        col.className = 'month-col';

        var group = document.createElement('div');
        group.className = 'bar-group';

        var currentBar = document.createElement('div');
        currentBar.className = 'bar bar--current';
        var currentPct = max > 0 ? (d.current[i] / max) * 100 : 0;
        currentBar.style.height = currentPct + '%';
        currentBar.setAttribute('data-tooltip', '2025: ' + formatValue(d.current[i], d.unit));

        var previousBar = document.createElement('div');
        previousBar.className = 'bar bar--previous';
        var previousPct = max > 0 ? (d.previous[i] / max) * 100 : 0;
        previousBar.style.height = previousPct + '%';
        previousBar.setAttribute('data-tooltip', '2024: ' + formatValue(d.previous[i], d.unit));

        group.appendChild(currentBar);
        group.appendChild(previousBar);
        col.appendChild(group);

        var label = document.createElement('div');
        label.className = 'month-label';
        label.textContent = MONTHS[i];
        col.appendChild(label);

        barsArea.appendChild(col);
      }
    }

    /**
     * Full chart render: Y-axis + grid + bars.
     */
    function renderChart(metric) {
      var max = renderYAxis(metric);
      renderBars(metric, max);
    }

    // -------------------------------------------------------------------
    // Summary text
    // -------------------------------------------------------------------
    function updateSummary(metric) {
      var d = DATA[metric];
      var currentTotal = 0;
      var previousTotal = 0;

      for (var i = 0; i <= CURRENT_MONTH_INDEX; i++) {
        currentTotal += d.current[i];
        previousTotal += d.previous[i];
      }

      var diff = currentTotal - previousTotal;
      var el = document.getElementById('summaryText');
      var unit = d.unit;
      var absDiff = Math.abs(diff).toLocaleString();

      if (metric === 'rides') {
        if (diff >= 0) {
          el.innerHTML = 'You\'ve completed <strong>' + absDiff + ' more rides</strong> than this time last year';
        } else {
          el.innerHTML = 'You\'ve completed <strong>' + absDiff + ' fewer rides</strong> than this time last year';
        }
      } else {
        var unitLabel = unit ? ' ' + unit : '';
        if (diff >= 0) {
          el.innerHTML = 'You\'ve ridden <strong>' + absDiff + unitLabel + ' more</strong> than this time last year';
        } else {
          el.innerHTML = 'You\'ve ridden <strong>' + absDiff + unitLabel + ' less</strong> than this time last year';
        }
      }
    }

    // -------------------------------------------------------------------
    // Initial render
    // -------------------------------------------------------------------
    renderChart(activeMetric);
    updateSummary(activeMetric);

    // -------------------------------------------------------------------
    // Metric toggle
    // -------------------------------------------------------------------
    document.querySelectorAll('.metric-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.metric-btn').forEach(function (b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');

        activeMetric = btn.getAttribute('data-metric');
        renderChart(activeMetric);
        updateSummary(activeMetric);
      });
    });
  </script>
</body>
</html>
